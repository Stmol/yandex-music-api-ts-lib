name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    name: Typecheck and smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run check:types

      - name: Dead code check
        run: npm run check:dead-code

      - name: Node tests
        run: npm run test:node

      - name: Package contract tests
        run: npm run test:meta

      - name: Bun smoke tests
        run: npm run test:bun

      - name: Deno smoke tests
        run: npm run test:deno

      - name: Verify package contents
        run: npm pack --dry-run
